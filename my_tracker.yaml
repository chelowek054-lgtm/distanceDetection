tracker_type: bytetrack
track_high_thresh: 0.6   # Снижаем: теперь объекты > 0.6 сразу получают ID
track_low_thresh: 0.1    # Очень важно: ловим "слабые" детекции (0.1 - 0.6)
new_track_thresh: 0.7    # Порог для создания совершенно нового ID
track_buffer: 100        # 100 кадров (~3-4 сек) памяти достаточно
match_thresh: 0.8
fuse_score: True